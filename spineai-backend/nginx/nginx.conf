worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        # Allow X-ray image uploads up to 10 MB
        client_max_body_size 10M;

        # ── Static frontend ────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            # SPA routing: fall back to index.html for unknown paths
            try_files $uri $uri/ /index.html;
        }

        # ── API proxy → FastAPI backend ────────────────────────────
        location /health {
            proxy_pass         http://backend:8000/health;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /predict {
            proxy_pass         http://backend:8000/predict;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # CPU inference can take up to 15s; set generous timeout
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── FastAPI auto-docs (dev convenience) ────────────────────
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
